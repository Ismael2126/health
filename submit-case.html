<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Aid - Health Aid Maldives</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="logo">Health Aid Maldives</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="cases.html">Cases</a></li>
      <li><a href="submit-case.html">Request Aid</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="admin/login.html">Admin</a></li>
    </ul>
  </nav>

  <section class="form-section">
    <div class="form-container">
      <h1>Medical Aid Request Form</h1>
      <p class="form-subtext">
        Please provide accurate details. All requests will be reviewed before publishing.
      </p>

      <form id="aidForm" class="aid-form">
  <div class="form-grid">

    <div class="form-group">
      <label for="patientName">Patient Name <span class="required">*</span></label>
      <input type="text" id="patientName" name="patientName" required>
    </div>

    <div class="form-group">
      <label for="guardianName">Guardian Name <span class="required">*</span></label>
      <input type="text" id="guardianName" name="guardianName" required>
    </div>

    <div class="form-group">
      <label for="age">Age <span class="required">*</span></label>
      <div style="display: flex; gap: 10px;">
        <input type="number" id="age" name="age" required min="0" style="flex: 1;">
        <select id="ageUnit" name="ageUnit" required style="flex: 1;">
          <option value="years">Years</option>
          <option value="months">Months</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="gender">Gender <span class="required">*</span></label>
      <select id="gender" required>
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>

    <div class="form-group">
      <label for="phone">Phone <span class="required">*</span></label>
      <input type="text" id="phone" name="phone" required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email">
    </div>

    <div class="form-group">
      <label for="island">Island <span class="required">*</span></label>
      <input type="text" id="island" name="island" required>
    </div>

    <div class="form-group">
      <label for="hospital">Hospital <span class="required">*</span></label>
      <input type="text" id="hospital" name="hospital" required>
    </div>

    <div class="form-group">
      <label for="caseTitle">Case Title <span class="required">*</span></label>
      <input type="text" id="caseTitle" name="caseTitle" required>
    </div>

    <div class="form-group full-width">
      <label for="diagnosis">Diagnosis <span class="required">*</span></label>
      <input type="text" id="diagnosis" name="diagnosis" required>
    </div>

    <div class="form-group full-width">
      <label for="story">Story <span class="required">*</span></label>
      <textarea id="story" name="story" required></textarea>
    </div>

    <div class="form-group">
      <label for="targetAmount">Target Amount <span class="required">*</span></label>
      <input type="number" id="targetAmount" name="targetAmount" required>
    </div>

    <!-- Bank Accounts -->
    <div class="bank-columns full-width">
      <div class="bank-box">
        <h3>MVR Account</h3>
        <div class="form-group">
          <label for="mvrBankName">Bank <span class="required">*</span></label>
          <select id="mvrBankName">
            <option value="">Select Bank</option>
            <option value="BML">BML</option>
            <option value="MIB">MIB</option>
          </select>
        </div>
        <div class="form-group">
          <label for="mvrAccountName">Account Name <span class="required">*</span></label>
          <input type="text" id="mvrAccountName" name="mvrAccountName">
        </div>
        <div class="form-group">
          <label for="mvrAccountNumber">Account Number <span class="required">*</span></label>
          <input type="text" id="mvrAccountNumber" name="mvrAccountNumber">
        </div>
      </div>

      <div class="bank-box">
        <h3>USD Account</h3>
        <div class="form-group">
          <label for="usdBankName">Bank <span class="required">*</span></label>
          <select id="usdBankName">
            <option value="">Select Bank</option>
            <option value="BML">BML</option>
            <option value="MIB">MIB</option>
          </select>
        </div>
        <div class="form-group">
          <label for="usdAccountName">Account Name <span class="required">*</span></label>
          <input type="text" id="usdAccountName" name="usdAccountName">
        </div>
        <div class="form-group">
          <label for="usdAccountNumber">Account Number <span class="required">*</span></label>
          <input type="text" id="usdAccountNumber" name="usdAccountNumber">
        </div>
      </div>
    </div>

    <div class="form-group full-width">
      <label for="documents">Upload Documents</label>
      <input type="file" id="documents" multiple>
    </div>

    <div class="checkbox-group full-width">
      <label>
        <input type="checkbox" id="confirmInfo"> I confirm that the information is accurate <span class="required">*</span>
      </label>
    </div>

  </div>

  <button type="submit" class="submit-btn">Submit Request</button>
  <div id="formMessage"></div>
</form>
    </div>
  </section>

  <script type="module" src="js/submit-case.js"></script>
</body>
</html>
