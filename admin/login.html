<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Health Aid Maldives</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <section class="form-section">
    <div class="form-container" style="max-width: 500px;">
      <h1>Admin Login</h1>
      <p class="form-subtext">Authorized administrators only.</p>

      <form id="adminLoginForm" class="aid-form">
        <div class="form-grid" style="grid-template-columns: 1fr;">
          <div class="form-group">
            <label for="adminEmail">Email Address</label>
            <input type="email" id="adminEmail" required />
          </div>

          <div class="form-group">
            <label for="adminPassword">Password</label>
            <input type="password" id="adminPassword" required />
          </div>
        </div>

        <button type="submit" class="submit-btn">Login</button>
        <div id="loginMessage" class="form-message"></div>
      </form>
    </div>
  </section>

  <script type="module" src="../js/admin-login.js"></script>
</body>
</html>
