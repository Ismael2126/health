<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Health Aid Maldives</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="logo">Health Aid Maldives Admin</div>
    <ul class="nav-links">
      <li><a href="../index.html">Main Site</a></li>
      <li><a href="#" id="logoutBtn">Logout</a></li>
    </ul>
  </nav>

  <section class="form-section">
    <div class="form-container" style="max-width: 1100px;">
      <h1>Admin Dashboard</h1>
      <p class="form-subtext">Review and manage submitted cases.</p>

      <div id="adminStatus" class="form-message"></div>

      <h2 style="margin: 20px 0;">Pending Cases</h2>
      <div id="pendingCases" class="cards"></div>

      <h2 style="margin: 40px 0 20px;">Approved Cases</h2>
      <div id="approvedCases" class="cards"></div>
    </div>
  </section>

  <script type="module" src="../js/admin-dashboard.js"></script>
</body>
</html>
