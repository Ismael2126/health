<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Medical Case – HealthAid MV</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <img src="images/flag-mv.png" class="flag" alt="MV" />
        <span class="brand">HealthAid MV</span>
      </div>

      <div class="nav-right">
        <a href="index.html">Home</a>
        <a href="cases.html">Cases</a>
        <a href="submit.html">Form</a>
        <a href="contact.html">Contact</a>
        <button id="darkToggle">🌙</button>
      </div>
    </nav>

    <main class="form-container">
      <h2>Submit Medical Assistance Request</h2>

      <form id="caseForm">
        <input type="text" id="name" placeholder="Patient Name" required />

        <input
          type="text"
          id="condition"
          placeholder="Medical Condition"
          required
        />

        <input
          type="number"
          id="amount"
          placeholder="Amount Needed (MVR)"
          required
        />

        <input
          type="file"
          id="documents"
          multiple
          accept="image/*,.pdf"
          required
          
        />
        <progress id="uploadProgress" value="0" max="100" style="width:100%; margin-top:10px;"></progress>


        <button type="submit">Submit Case</button>

        <p id="statusMsg"></p>
      </form>
    </main>

    <script type="module" src="js/submit.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
